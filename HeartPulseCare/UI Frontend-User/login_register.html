<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HeartPulseCare | Login</title>
  <link rel="stylesheet" href="login_register.css">
</head>
<body>

<div class="auth-container">

  <!-- LEFT INFO -->
  <div class="auth-info">
    <h1>❤️ HeartPulseCare</h1>
    <p>Your personal heart-health companion</p>
    <ul>
      <li>✔ Track health & diet</li>
      <li>✔ Book appointments</li>
      <li>✔ Get personalised insights</li>
    </ul>
  </div>

  <!-- RIGHT FORM -->
  <div class="auth-card">

    <div class="tab-switch">
      <button class="tab active" id="loginTab">Login</button>
      <button class="tab" id="registerTab">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form action="http://127.0.0.1:5000/login" method="POST" class="form active">
      <h2>Welcome Back 👋</h2>

      <input type="email" name="loginEmail" placeholder="Email" required>
      <input type="password" name="loginPassword" placeholder="Password" required>

      <button type="submit" class="primary-btn">Login</button>

      <p class="switch-text">
        New user? <span id="goRegister">Create an account</span>
      </p>
    </form>

    <!-- REGISTER FORM -->
    <form action="http://127.0.0.1:5000/register" method="POST" class="form">
      <h2>Create Account 💚</h2>

      <input type="full_name" name="regName" placeholder="Full Name" required>
      <input type="email" name="regEmail" placeholder="Email" required>
      <input type="password" name="regPassword" placeholder="Password" required>
      <input type="password" name="regConfirmPassword" placeholder="Confirm Password" required>

      <button type="submit" class="primary-btn">Register</button>

      <p class="switch-text">
        Already registered? <span id="goLogin">Login here</span>
      </p>
    </form>

  </div>
</div>

<script src="login_register.js"></script>
</body>
</html>
